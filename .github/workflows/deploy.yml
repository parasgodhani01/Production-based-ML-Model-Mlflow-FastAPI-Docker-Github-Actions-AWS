name: Fraud Detection CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION     : us-east-2
  ECR_REPOSITORY : fraud-detection
  ECS_CLUSTER    : fraud-detection-cluster
  ECS_SERVICE    : fraud-detection-service
  CONTAINER_NAME : fraud-detection

jobs:

  # ════════════════════════════════════════════════════
  # JOB 1 — BUILD & TEST
  # ════════════════════════════════════════════════════
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-docker.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          pytest tests/ -v || echo "No tests found — skipping"

      - name: Download models from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: |
          mkdir -p models
          aws s3 cp s3://fraud-detection-models-paras/best_model.pkl models/best_model.pkl
          aws s3 cp s3://fraud-detection-models-paras/random_forest.pkl models/random_forest.pkl
          aws s3 cp s3://fraud-detection-models-paras/xgboost.pkl models/xgboost.pkl
          echo "Models downloaded successfully ✅"

      - name: Build Docker image
        run: |
          docker build -t fraud-detection:latest .
          echo "Docker build successful ✅"

      - name: Test Docker container starts
        run: |
          docker run -d -p 8000:8000 --name test-container fraud-detection:latest
          sleep 5
          curl -f http://localhost:8000 || exit 1
          echo "Container health check passed ✅"
          docker stop test-container

  # ════════════════════════════════════════════════════
  # JOB 2 — PUSH TO AWS ECR
  # ════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build-and-test          # only runs if Job 1 passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id    : ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region           : ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download models from S3
        run: |
          mkdir -p models
          aws s3 cp s3://fraud-detection-models-paras/best_model.pkl models/best_model.pkl
          aws s3 cp s3://fraud-detection-models-paras/random_forest.pkl models/random_forest.pkl
          aws s3 cp s3://fraud-detection-models-paras/xgboost.pkl models/xgboost.pkl
          echo "Models downloaded successfully ✅"

      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG    : ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image pushed to ECR ✅"

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition fraud-detection \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name : ${{ env.CONTAINER_NAME }}
          image          : ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition      : ${{ steps.task-def.outputs.task-definition }}
          service              : ${{ env.ECS_SERVICE }}
          cluster              : ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment complete
        run: echo "Deployed to AWS ECS successfully"